        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-glow: #3b82f6;
            --accent-glow: #8b5cf6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tiro Bangla', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Beautiful glowing background blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
            animation: float 20s infinite alternate;
        }

        .blob-1 {
            background: var(--primary-glow);
            top: -10%;
            left: -10%;
        }

        .blob-2 {
            background: var(--accent-glow);
            bottom: -10%;
            right: -10%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        /* Glassmorphism Container Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Countdown Ring & Number Styling */
        .countdown-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .countdown-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .track-ring {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .progress-ring {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .countdown-number {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1s infinite alternate;
            user-select: none;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.96);
                opacity: 0.9;
            }

            100% {
                transform: scale(1.04);
                opacity: 1;
            }
        }

        /* Message Styling */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* Modern Loading Dots Animation */
        .loader-dots {
            display: inline-flex;
            gap: 6px;
            margin-top: 10px;
        }

        .loader-dots span {
            width: 8px;
            height: 8px;
            background-color: var(--primary-glow);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }

        .loader-dots.stopped span {
            animation: none;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Fallback Link / Manual button */
        .btn-redirect {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-redirect:hover {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .btn-redirect:active {
            transform: translateY(0);
        }

        .countdown-number-highlight {
            color: #ef4444;
            font-weight: bold;
        }

        .countdown-text-highlight {
            color: #10b981;
        }

        /* Popup overlay style */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-content {
            background: var(--card-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 3rem 2rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.15);
            transform: scale(0.9);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .popup-overlay.show .popup-content {
            transform: scale(1);
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: pulse-error 2s infinite alternate;
        }

        @keyframes pulse-error {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        .popup-content h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 1rem;
        }

        .popup-content p {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 2rem;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            text-decoration: none;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        .popup-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-top: 1.5rem;
        }
    </style>
</head>

        </div>

        <a id="redirect-link" href="#" class="btn-redirect">শুকরিয়া 🤲 </a>
    </div>

    <!-- Error Popup Overlay -->
    <div id="error-popup" class="popup-overlay">
        <div class="popup-content">
            <div class="error-icon">⚠️</div>
            <h2>দুঃখিত</h2>
            <p>কিছুক্ষণ পর আবার চেষ্টা করুন।</p>
            <div class="popup-buttons">
                <a href="#" class="btn-home" onclick="handleHomeClick(); return false;">হোম পেজ</a>
                <a href="#" class="btn-retry" onclick="location.reload(); return false;">পুনরায় চেষ্টা করুন</a>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // আপনার ইউআরএল সমূহ এখানে বসান:
        // ==========================================
        const PRIMARY_URL = "https://kazi-chowrasta.unaux.comnn";
        const FALLBACK_URL = "https://kazio-chowrasta-server1.linkbd.vip"; // প্রথম ইউআরএল কাজ না করলে এখানে যাবে

        let finalDestination = PRIMARY_URL;

        // বাংলা সংখ্যা ম্যাপিং
        const banglaNumbers = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯', '১০'];

        let timeLeft = 10;
        let isRedirecting = false;
        let checksCompletedWithError = false;
        const countdownEl = document.getElementById('countdown');
        const progressEl = document.getElementById('progress');
        const statusDescEl = document.getElementById('status-desc');
        const redirectLinkEl = document.getElementById('redirect-link');
        const statusTitleEl = document.getElementById('status-title');

        // প্রাথমিকভাবে রিডাইরেক্ট বাটনের লিংক সেট করা
        redirectLinkEl.href = finalDestination;

        // বৃত্তাকার প্রগ্রেস বার অ্যানিমেশন
        const radius = 70;
        const circumference = 2 * Math.PI * radius;
        progressEl.style.strokeDasharray = circumference;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressEl.style.strokeDashoffset = offset;
        }

        // শুরুতে ১০০% সেট করুন
        setProgress(100);

        // রিডাইরেক্ট ফাংশন
        function redirectToDestination(url) {
            if (isRedirecting || checksCompletedWithError) return;
            isRedirecting = true;
            statusTitleEl.innerText = "অ্যাপটি ওপেন করা হচ্ছে . . .";
            statusDescEl.innerText = "লোডিং হচ্ছে . . . . . . .";

            // চূড়ান্ত ইউআরএল দিয়ে বাটন লিংক আপডেট
            redirectLinkEl.href = url;

            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }

        // টাইমার যা ১০ সেকেন্ড পর্যন্ত কাউন্টডাউন করবে
        const timer = setInterval(() => {
            if (isRedirecting || checksCompletedWithError) {
                clearInterval(timer);
                return;
            }

            timeLeft--;

            if (timeLeft >= 0) {
                // বাংলা সংখ্যায় আপডেট করুন
                countdownEl.innerText = banglaNumbers[timeLeft];
                statusDescEl.innerHTML = `<span class="countdown-number-highlight">${banglaNumbers[timeLeft]}</span><span class="countdown-text-highlight"> সেকেন্ডের মধ্যে লোড করা হবে . . .</span>`;

                // প্রগ্রেস আপডেট
                setProgress((timeLeft / 10) * 100);
            }

            if (timeLeft === 0) {
                clearInterval(timer);
                if (!checksCompletedWithError) {
                    redirectToDestination(finalDestination);
                }
            }
        }, 1000);

        // টার্গেট ইউআরএল সমূহ ব্যাকগ্রাউন্ডে প্রি-লোড করার চেষ্টা
        try {
            const prefetchPrimary = document.createElement('link');
            prefetchPrimary.rel = 'prefetch';
            prefetchPrimary.href = PRIMARY_URL;
            document.head.appendChild(prefetchPrimary);

            const prefetchFallback = document.createElement('link');
            prefetchFallback.rel = 'prefetch';
            prefetchFallback.href = FALLBACK_URL;
            document.head.appendChild(prefetchFallback);
        } catch (e) {
            console.error("Preload links could not be added", e);
        }

        // URL reachability helper using fetch & timeout
        function checkUrlReachability(url, timeoutMs = 4000) {
            return new Promise((resolve) => {
                let completed = false;
                const timeoutTimer = setTimeout(() => {
                    if (!completed) {
                        completed = true;
                        resolve(false); // Timed out, assume unreachable
                    }
                }, timeoutMs);

                fetch(url, { mode: 'no-cors' })
                    .then(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutTimer);
                            resolve(true); // Reachable
                        }
                    })
                    .catch(() => {
                        if (!completed) {
                            completed = true;
                            clearTimeout(timeoutTimer);
                            resolve(false); // Fetch failed, assume unreachable
                        }
                    });
            });
        }

        function showErrorPopup() {
            checksCompletedWithError = true;
            clearInterval(timer);
            document.getElementById('error-popup').classList.add('show');
        }

        function handleHomeClick() {
            document.getElementById('error-popup').classList.remove('show');
            timeLeft = 0;
            countdownEl.innerText = banglaNumbers[0];
            statusDescEl.innerHTML = `<span class="countdown-number-highlight">${banglaNumbers[0]}</span><span class="countdown-text-highlight"> সেকেন্ডের মধ্যে লোড করা হবে . . .</span>`;
            setProgress(0);
            const loader = document.querySelector('.loader-dots');
            if (loader) {
                loader.classList.add('stopped');
            }

            // শুকরিয়া বাটনটি পরিবর্তন করে পুনরায় চেষ্টা করুন বাটনে রূপান্তর করা
            redirectLinkEl.innerHTML = 'পুনরায় <span style="margin: 0 8px;">⟳</span> চেষ্টা করুন';
            redirectLinkEl.href = "#";
            redirectLinkEl.onclick = function (e) {
                e.preventDefault();
                location.reload();
            };
        }

        // Start checking URL reachability sequentially
        checkUrlReachability(PRIMARY_URL, 4000).then((isPrimaryOk) => {
            if (isPrimaryOk) {
                finalDestination = PRIMARY_URL;
                redirectToDestination(PRIMARY_URL);
            } else {
                console.warn("Primary URL is unreachable. Checking fallback...");
                checkUrlReachability(FALLBACK_URL, 4000).then((isFallbackOk) => {
                    if (isFallbackOk) {
                        finalDestination = FALLBACK_URL;
                        redirectToDestination(FALLBACK_URL);
                    } else {
                        console.error("Both primary and fallback URLs are unreachable.");
                        showErrorPopup();
                    }
                });
            }
        });
    </script>
</body>

</html>
